<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Krok 8 – Kontakt</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar__inner">
      <div class="brand">
        <div class="brand__logo" aria-hidden="true"></div>
        <div>
          <div class="brand__name">Energetická kalkulačka (orientační)</div>
          <div class="brand__tag">Fotovoltaika • Tepelná čerpadla • Ohřev vody a vytápění</div>
        </div>
      </div>
      <div class="navlinks">
        <a href="./index.html">Úvod</a>
        <a href="./step1.html">Kalkulačka</a>
        <button class="btn" id="resetBtn" type="button">Vymazat údaje</button>
      </div>
    </div>
  </header>

  <main class="main wrap section">
    
        <div class="wizardTop">
          <div class="progress"><div class="progress__bar" data-progress style="width:0%"></div></div>
          <div class="meta">
            <span class="pulse" aria-hidden="true"></span>
            <span data-stepLabel class="mono">Krok 8 z 8</span>
            <span class="phase" data-phase>Fáze: Výpočet (1–4)</span>
            <span class="timer"><span data-timer>10:00</span></span>
          </div>
        </div>
    <div class="card">
      
<h2>Krok 8: Kontakt</h2>
<p>Kontakt je <b>povinný</b>, aby bylo možné poslat podklady a domluvit další postup.</p>
<div class="form">
  <div class="field"><label for="phone">Mob.</label><input id="phone" inputmode="tel" placeholder="+420 ..." /></div>
  <div class="field"><label for="email">@</label><input id="email" inputmode="email" placeholder="email@domena.cz" /></div>
</div>
<div class="err" id="err" hidden></div>
<div class="nav"><a class="btn" href="./step7.html">Zpět</a><button class="btn btn--primary" id="next" type="button">Dokončit</button></div>

    </div>
  </main>

  <footer class="footer">
    <div class="wrap footer__inner">
      © 2026 • Energetická kalkulačka (orientační)
    </div>
  </footer>

  <script src="./app.js"></script>
  <script>
    // global init
    const rb = document.getElementById('resetBtn');
    if (rb) rb.addEventListener('click', () => { ECO.resetAll(); window.location.href='./index.html'; });
    ECO.renderTimer();
    ECO.setWizardTop(8,8);
  </script>
  <script>
  
(() => {
  const s=ECO.loadState();
  const phone=document.getElementById('phone');
  const email=document.getElementById('email');
  const err=document.getElementById('err');
  phone.value=s.phone||"";
  email.value=s.email||"";

  document.getElementById('next').addEventListener('click', () => {
    s.phone=(phone.value||"").trim();
    s.email=(email.value||"").trim();

    const errs=[];
    if(!s.phone) errs.push("Doplň telefon.");
    if(!s.email) errs.push("Doplň e‑mail.");
    if(s.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s.email)) errs.push("E‑mail nevypadá validně.");

    if(errs.length){ ECO.showError(err, errs); return; }
    ECO.showError(err, []);
    ECO.saveState(s);
    ECO.navigate("./done.html");
  });
})();</script>
</body>
</html>
